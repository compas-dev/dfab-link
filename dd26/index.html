<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Canvas Visuals</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!--<h1> COMPAS DEV DAY 2026</h1>-->

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0e0e0e;
    }

    canvas {
      display: block;
      cursor: default;
    }

    h1 {
      font-size: 4em;
      position: fixed;
      color: royalblue;
      width: 100%;
      text-align: center;
      z-index: 100;
      font-family: "helvetica";
      top: 55vh;
    }
  </style>
</head>

<body>
  <canvas id="canvas"></canvas>

  <script>


    // STROKE_COLOR = "rgb(0, 175, 250)"
    STROKE_COLOR = "black"
    // BACKGROUND = "#001a2e"
    BACKGROUND = "#fffaeb"
    // BACKGROUND = "rgba(0, 26, 46, 1)" // Semi-transparent background for trails


    class Bubble {
      constructor(x, y, radius) {
        this.x = x;
        this.y = y;
        this.radius = radius;
        this.speed = Math.random() * 2 + 1;
        this.vx = Math.random() * 2 - 1; // Horizontal drift
        this.vy = Math.random() * 2 - 1; // Vertical speed
        this.baseSpeed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
      }

      update(bubbles) {
        const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
        if (speed > this.baseSpeed) {
          this.vx *= 0.985;
          this.vy *= 0.985;
        } else if (speed > 0.001) {
          // Gently restore to baseline speed along current direction
          const scale = this.baseSpeed / speed;
          this.vx *= 1 + (scale - 1) * 0.05;
          this.vy *= 1 + (scale - 1) * 0.05;
        }
        this.x += this.vx;
        this.y += this.vy;

        this.check_borders_collisions();
        this.check_other_bubbles_collisions(bubbles)
        this.check_compas_logo_collision()
      }

      check_borders_collisions() {
        if (this.x - this.radius < 0 || this.x + this.radius > window.innerWidth) {
          this.vx *= -1; // Bounce off the sides
        }

        if (this.y - this.radius < 0 || this.y + this.radius > window.innerHeight) {
          this.vy *= -1; // Bounce off the top and bottom
        }
      }

      check_other_bubbles_collisions(bubbles) {
        for (const other of bubbles) {
          if (other !== this) {
            const dx = other.x - this.x;
            const dy = other.y - this.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < this.radius + other.radius) {
              // Simple collision response: swap velocities
              const tempVx = this.vx;
              const tempVy = this.vy;
              this.vx = other.vx;
              this.vy = other.vy;
              other.vx = tempVx;
              other.vy = tempVy;
            }
          }
        }
      }

      check_compas_logo_collision() {
        const dx = ((window.innerWidth / 2)) - this.x;
        const dy = ((window.innerHeight / 2)) - this.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        if (distance < this.radius + 75 * getScale()) { // 75 is half the logo size
          // Simple collision response: bounce off the logo
          const angle = Math.atan2(dy, dx);
          const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
          this.vx = -Math.cos(angle) * speed;
          this.vy = -Math.sin(angle) * speed;
        }
      }

      draw(ctx) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = BACKGROUND
        ctx.strokeStyle = STROKE_COLOR
        ctx.lineWidth = 7;
        ctx.fill();
        ctx.stroke();

        if (this.radius > 25 * getScale()) {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius - 20 * getScale(), 0, Math.PI * 2);
          ctx.fillStyle = "black";
          ctx.strokeStyle = STROKE_COLOR;
          ctx.lineWidth = 5;
          ctx.fill();
          ctx.stroke();
        }
      }
    }



    function create_bubbles() {
      const bubbles = [];
      for (let i = 0; i < 5; i++) {
        for (let j = 0; j < 4; j++) {
          const x = i * ((window.innerWidth - 100) / 4) + 50; // Distribute bubbles evenly across the width
          const y = j * ((window.innerHeight - 100) / 3) + 50; // Distribute bubbles evenly across the height
          const radius = (Math.random() * 30 + 20) * getScale();
          const bubble = new Bubble(x, y, radius);
          bubbles.push(bubble);
        }
      }
      return bubbles;
    }



    // Scale factor: 1 on desktop, shrinks down to 0.5 on narrow screens
    function getScale() {
      return Math.max(0.5, Math.min(1, window.innerWidth / 768));
    }

    // Resize canvas
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }





    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let mouseX = -1000, mouseY = -1000;
    let isHoveringLogo = false;
    let hoverPulse = 0;
    let hoverOpacity = 0;

    let draggedBubble = null;
    let prevDragX = 0, prevDragY = 0;
    let dragVx = 0, dragVy = 0;

    function releaseDrag(vx, vy) {
      if (!draggedBubble) return;
      const maxSpeed = 12;
      const speed = Math.sqrt(vx * vx + vy * vy);
      if (speed > maxSpeed) {
        draggedBubble.vx = (vx / speed) * maxSpeed;
        draggedBubble.vy = (vy / speed) * maxSpeed;
      } else {
        draggedBubble.vx = vx;
        draggedBubble.vy = vy;
      }
      draggedBubble = null;
    }

    function isOverLogo(x, y) {
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const dx = x - cx;
      const dy = y - cy;
      return Math.sqrt(dx * dx + dy * dy) < 75 * getScale();
    }

    function bubbleAt(x, y) {
      // Iterate in reverse so topmost-drawn bubble is picked first
      for (let i = bubbles.length - 1; i >= 0; i--) {
        const b = bubbles[i];
        const dx = x - b.x;
        const dy = y - b.y;
        if (Math.sqrt(dx * dx + dy * dy) < b.radius) return b;
      }
      return null;
    }

    canvas.addEventListener("mousedown", (e) => {
      if (isOverLogo(e.clientX, e.clientY)) return; // logo click handled separately
      const b = bubbleAt(e.clientX, e.clientY);
      if (b) {
        draggedBubble = b;
        prevDragX = e.clientX;
        prevDragY = e.clientY;
        dragVx = 0;
        dragVy = 0;
        b.vx = 0;
        b.vy = 0;
        canvas.style.cursor = "grabbing";
      }
    });

    canvas.addEventListener("mousemove", (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;

      if (draggedBubble) {
        dragVx = e.clientX - prevDragX;
        dragVy = e.clientY - prevDragY;
        draggedBubble.x = e.clientX;
        draggedBubble.y = e.clientY;
        prevDragX = e.clientX;
        prevDragY = e.clientY;
        canvas.style.cursor = "grabbing";
        return;
      }

      const overBubble = !!bubbleAt(mouseX, mouseY);
      const over = isOverLogo(mouseX, mouseY);
      isHoveringLogo = over && !draggedBubble;
      canvas.style.cursor = over ? "pointer" : overBubble ? "grab" : "default";
    });

    canvas.addEventListener("mouseup", () => {
      if (draggedBubble) {
        releaseDrag(dragVx, dragVy);
        canvas.style.cursor = "default";
      }
    });

    canvas.addEventListener("mouseleave", () => {
      if (draggedBubble) {
        releaseDrag(dragVx, dragVy);
      }
      isHoveringLogo = false;
      canvas.style.cursor = "default";
    });

    canvas.addEventListener("click", (e) => {
      if (isOverLogo(e.clientX, e.clientY)) {
        window.open("https://join.compas.dev/dd26", "_blank");
      }
    });

    // ── Touch support ────────────────────────────────────────────────────────
    let touchStartX = 0, touchStartY = 0;

    canvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      const t = e.changedTouches[0];
      touchStartX = t.clientX;
      touchStartY = t.clientY;
      if (isOverLogo(t.clientX, t.clientY)) return;
      const b = bubbleAt(t.clientX, t.clientY);
      if (b) {
        draggedBubble = b;
        prevDragX = t.clientX;
        prevDragY = t.clientY;
        dragVx = 0;
        dragVy = 0;
        b.vx = 0;
        b.vy = 0;
      }
    }, { passive: false });

    canvas.addEventListener("touchmove", (e) => {
      e.preventDefault();
      if (!draggedBubble) return;
      const t = e.changedTouches[0];
      dragVx = t.clientX - prevDragX;
      dragVy = t.clientY - prevDragY;
      draggedBubble.x = t.clientX;
      draggedBubble.y = t.clientY;
      prevDragX = t.clientX;
      prevDragY = t.clientY;
    }, { passive: false });

    canvas.addEventListener("touchend", (e) => {
      e.preventDefault();
      const t = e.changedTouches[0];
      if (draggedBubble) {
        releaseDrag(dragVx, dragVy);
      } else {
        // Tap on logo (no bubble was grabbed and touch didn't move much)
        const dx = t.clientX - touchStartX;
        const dy = t.clientY - touchStartY;
        if (Math.sqrt(dx * dx + dy * dy) < 10 && isOverLogo(t.clientX, t.clientY)) {
          window.open("https://join.compas.dev/dd26", "_blank");
        }
      }
    }, { passive: false });

    compas_icon = new Image();
    compas_icon.src = "compas_icon.png";


    // SETUP
    const bubbles = create_bubbles();
    window.addEventListener("resize", resize);
    resize();




    function animate(time) {
      // ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = BACKGROUND; // Set this to your desired background color
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const maxDistance = 300 * getScale(); // Maximum distance to draw a line
      dotted = 0
      for (let i = 0; i < bubbles.length; i++) {
        for (let j = i + 1; j < bubbles.length; j++) {
          const bubble1 = bubbles[i];
          const bubble2 = bubbles[j];
          const dx = bubble2.x - bubble1.x;
          const dy = bubble2.y - bubble1.y;
          const distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < maxDistance) {
            ctx.beginPath();
            ctx.moveTo(bubble1.x, bubble1.y);
            ctx.lineTo(bubble2.x, bubble2.y);
            // ctx.strokeStyle = `rgba(0, 175, 250, ${1 - distance / maxDistance})`;
            ctx.strokeStyle = `rgba(0, 0, 0, ${1 - distance / maxDistance})`;
            // ctx.strokeStyle = STROKE_COLOR
            ctx.lineWidth = 1 + 4 * (getScale() - 0.5) * 2;
            dash_line = 40
            ratio = distance / maxDistance
            gap = ratio * dash_line - 15
            line = dash_line - gap
            ctx.setLineDash([line, gap]); // Dotted line
            ctx.stroke();
            ctx.setLineDash([]); // Reset to solid line for next connections
            dotted++
          }
        }
      }


      // Draw lines to the center from close bubbles
      const centerMaxDistance = 400 * getScale(); // Maximum distance from center to draw a line
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      dotted = 0
      for (const bubble of bubbles) {
        const dx = centerX - bubble.x;
        const dy = centerY - bubble.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < centerMaxDistance) {
          ctx.beginPath();
          ctx.moveTo(bubble.x, bubble.y);
          ctx.lineTo(centerX, centerY);

          // ctx.strokeStyle = `rgba(0, 175, 250, ${1 - distance / centerMaxDistance})`;
          ctx.strokeStyle = `rgba(0, 0, 0, ${1 - distance / centerMaxDistance})`;
          // ctx.strokeStyle = STROKE_COLOR
          ctx.lineWidth = 1 + 4 * (getScale() - 0.5) * 2;
          // if(dotted % 3 === 0){
          //   ctx.setLineDash([6, 10]); // Dotted line
          // } else if(dotted % 3 === 1){
          //    ctx.setLineDash([20, 10]); // Dashed line{
          // }

          dash_line = 20
          ratio = distance / centerMaxDistance
          gap = ratio * dash_line - 7
          line = dash_line - gap
          ctx.setLineDash([line, gap]); // Dotted line

          ctx.stroke();
          ctx.setLineDash([]); // Reset to solid line for next connections
          dotted++
        }
      }


      for (const bubble of bubbles) {
        if (bubble !== draggedBubble) bubble.update(bubbles);
        bubble.draw(ctx);
      }


      // Hover glow effect
      const targetOpacity = isHoveringLogo ? 1 : 0;
      hoverOpacity += (targetOpacity - hoverOpacity) * 0.06;

      if (hoverOpacity > 0.01) {
        hoverPulse += 0.05;
        const pulse = Math.sin(hoverPulse) * 0.5 + 0.5; // 0..1 oscillation

        // Expanding ripple rings
        const s = getScale();
        for (let r = 0; r < 3; r++) {
          const ringPhase = (hoverPulse * 0.8 + r * (Math.PI * 2 / 3)) % (Math.PI * 2);
          const ringRadius = 78 * s + ((ringPhase / (Math.PI * 2)) % 1) * 60 * s;
          const ringAlpha = (1 - (ringRadius - 78 * s) / (60 * s)) * hoverOpacity;
          ctx.beginPath();
          ctx.arc(canvas.width / 2, canvas.height / 2, ringRadius, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(0, 0, 0, ${ringAlpha * 0.5})`;
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        // Glow behind icon
        const glow = ctx.createRadialGradient(
          canvas.width / 2, canvas.height / 2, 40 * s,
          canvas.width / 2, canvas.height / 2, 110 * s
        );
        glow.addColorStop(0, `rgba(80, 80, 80, ${(0.18 + pulse * 0.12) * hoverOpacity})`);
        glow.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.beginPath();
        ctx.arc(canvas.width / 2, canvas.height / 2, 110 * s, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();
      } else {
        hoverPulse = 0;
      }

      const logoSize = 150 * getScale();
      ctx.drawImage(compas_icon, canvas.width / 2 - logoSize / 2, canvas.height / 2 - logoSize / 2, logoSize, logoSize);
      ctx.beginPath();
      ctx.arc(canvas.width / 2, canvas.height / 2, 72 * getScale(), 0, Math.PI * 2);
      ctx.strokeStyle = "black";
      ctx.lineWidth = 2;
      ctx.stroke();
      requestAnimationFrame(animate);
    }

    compas_icon.onload = () => {
      requestAnimationFrame(animate);
    };


  </script>
</body>

</html>
